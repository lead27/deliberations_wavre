name: Génération quotidienne

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du dépôt
        uses: actions/checkout@v4

      - name: 🔧 Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📰 Génération des analyses
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python pipeline_journalistique.py --groupes bw namur lux

      - name: 💾 Sauvegarde des fichiers générés dans le dépôt
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Aucun changement à enregistrer."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "Aucun fichier généré modifié après git add."
            exit 0
          fi

          git commit -m "Update generated council analyses"
          git push

      - name: 📁 Préparation des fichiers pour GitHub Pages
        run: |
          rm -rf public
          mkdir -p public
          cp analyse_conseils_communaux.html public/index.html
          cp analyse_conseils_communaux.json public/analyse_conseils_communaux.json
          cp analyse_conseils_communaux.txt public/analyse_conseils_communaux.txt

      - name: 📤 Publication de l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
